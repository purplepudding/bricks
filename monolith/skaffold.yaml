apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: monolith

build:
  artifacts:
    - image: ghcr.io/purplepudding/bricks/monolith
      ko:
        main: ./cmd/monolith
        dependencies:
          paths:
            - cmd
            - config
            - deploy
            - service
            - ../lib
            - ../go.mod
            - ../go.sum
            - ../api
            - ../auth
            - ../gateway
            - ../item
            - ../persistence
            - ../settings

manifests:
  kustomize:
    paths:
      - deploy/k8s/local

portForward:
  - resourceType: service
    resourceName: gateway
    namespace: bricks
    port: 80
    localPort: 8080
  - resourceType: service
    resourceName: auth
    namespace: bricks
    port: 80
    localPort: 8081
  - resourceType: service
    resourceName: persistence
    namespace: bricks
    port: 80
    localPort: 8082
  - resourceType: service
    resourceName: settings
    namespace: bricks
    port: 80
    localPort: 8083
  - resourceType: service
    resourceName: item
    namespace: bricks
    port: 80
    localPort: 8084
  - resourceType: service
    resourceName: matchmaking
    namespace: bricks
    port: 80
    localPort: 8085
