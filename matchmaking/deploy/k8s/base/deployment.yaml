apiVersion: apps/v1
kind: Deployment
metadata:
  name: matchmaking
  namespace: bricks
  labels:
    app: matchmaking
spec:
  replicas: 1
  selector:
    matchLabels:
      app: matchmaking
  template:
    metadata:
      name: matchmaking
      labels:
        app: matchmaking
    spec:
      containers:
        - name: matchmaking
          image: ghcr.io/purplepudding/bricks/matchmaking:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              protocol: TCP
      restartPolicy: Always
