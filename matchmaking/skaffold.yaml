apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: matchmaking

build:
  artifacts:
    - image: ghcr.io/purplepudding/bricks/matchmaking
      ko:
        main: ./cmd/matchmaking
        dependencies:
          paths:
            - cmd
            - config
            - deploy
            - internal
            - service
            - ../lib
            - ../go.mod
            - ../go.sum

manifests:
  kustomize:
    paths:
      - deploy/k8s/local

portForward:
  - resourceType: service
    resourceName: matchmaking
    port: 80
    localPort: 8080