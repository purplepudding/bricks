syntax = "proto3";
package bricks.v1.matchmaking;

import "google/api/annotations.proto";

option go_package = "bricks/v1/matchmaking";

message RequestMatchRequest {
  int32 port = 1;
}

message RequestMatchResponse {
  oneof update {
    AwaitingMatch awaiting_match = 1;
    MatchFound match_found = 2;
  }
}

message AwaitingMatch {}

message MatchFound {}

service MatchmakingService {
  rpc RequestMatch(RequestMatchRequest) returns (stream RequestMatchResponse) {
    option (google.api.http) = {
      post: "/v1/matchmaking/request-match"
      body: "*"
    };
  }
}
