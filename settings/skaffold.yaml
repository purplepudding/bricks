apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: settings

build:
  artifacts:
    - image: ghcr.io/purplepudding/bricks/settings
      ko:
        main: ./cmd/settings
        dependencies:
          paths:
            - cmd
            - config
            - deploy
            - internal
            - service
            - ../lib
            - ../go.mod
            - ../go.sum

manifests:
  kustomize:
    paths:
      - deploy/k8s/local
  helm:
    releases:
      - name: nats
        remoteChart: nats
        repo: https://nats-io.github.io/k8s/helm/charts
        setValues:
          config:
            jetstream:
              enabled: true
              fileStore:
                pvc:
                  size: 1Gi
          natsBox:
            enabled: false

portForward:
  - resourceType: service
    resourceName: settings
    port: 80
    localPort: 8080
  - resourceType: service
    resourceName: settings-valkey
    port: 6379
    localPort: 6379
  - resourceType: service
    resourceName: nats
    namespace: default
    port: 4222
    localPort: 4222