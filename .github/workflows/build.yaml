name: Build

on:
  push:
    branches:
      - main

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{steps.semver.outputs.next}}

    steps:
      - uses: actions/checkout@v5

      - name: Get Next Version
        id: semver
        uses: ietf-tools/semver-action@v1
        with:
          token: ${{ github.token }}
          branch: main
          patchAll: "true"
          noVersionBumpBehavior: "patch"
          fallbackTag: "v0.1.0"

      - name: Create Release
        uses: ncipollo/release-action@v1.12.0
        with:
          allowUpdates: true
          draft: false
          makeLatest: true
          name: ${{ steps.semver.outputs.next }}
          token: ${{ github.token }}
          commit: ${{ github.sha }}
          tag: ${{ steps.semver.outputs.next }}

  publish-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: bufbuild/buf-action@v1
        with:
          token: ${{ secrets.BUF_TOKEN }}
          input: api/proto/

  build-container:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      attestations: write
      id-token: write
    needs: version

    strategy:
      matrix:
        svc:
          - auth
          - gateway
          - item
          - matchmaking
          - monolith
          - persistence
          - settings

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"

      - name: Setup ko
        uses: ko-build/setup-ko@v0.9

      - name: Build container
        run: GOFLAGS="-ldflags=-X=github.com/purplepudding/bricks.Version=${{needs.version.outputs.version}}" ko build ./${{matrix.svc}}/cmd/${{matrix.svc}} --tags ${{needs.version.outputs.version}} --tags latest --base-import-paths --platform=linux/amd64,linux/arm64

      - name: Update kustomization
        uses: rmeneely/update-yaml@v1
        with:
          inFile: "${{matrix.svc}}/deploy/k8s/dev/kustomization.yaml"
          varlist: images[0].newTag=${{steps.semver.outputs.next}}

      - name: Commit changes
        uses: EndBug/add-and-commit@v9
        with:
          message: "deploy: ${{matrix.svc}} ${{steps.semver.outputs.next}} [no ci]"
          branch: main
          master_branch: main
